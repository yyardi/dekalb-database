server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* calls → FastAPI backend (strips /api prefix)
    location /api/ {
        proxy_pass http://trade-tracker:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all other paths serve index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
