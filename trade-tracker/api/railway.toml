[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required environment variables (set these in Railway dashboard):
#
#   DB_HOST          = your Railway PostgreSQL host
#   POSTGRES_DB      = trade_tracker
#   POSTGRES_USER    = postgres
#   POSTGRES_PASSWORD = (from Railway Postgres service)
#
#   IBKR_ENABLED     = true
#   IBKR_CLIENT_ID   = (from IBKR developer portal)
#   IBKR_CLIENT_SECRET = (from IBKR developer portal)
#   IBKR_ACCOUNT_ID  = U1234567
#   IBKR_REDIRECT_URI = https://YOUR-APP.railway.app/ibkr/auth/callback
#
#   FRONTEND_URL     = https://YOUR-APP.vercel.app
