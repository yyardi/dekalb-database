services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  questdb:
    image: questdb/questdb
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    volumes:
      - ./questdb-data:/var/lib/questdb

  adminer:              
    image: adminer      
    ports:              
      - "8080:8080"     

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "5555:5555"
    environment:
      - DB_HOST=postgres
      - QUESTDB_ILP_HOST=questdb